name: Verificação do site

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Verificar arquivos principais
        run: |
          test -f index.html
          test -f assets/css/style.css
          test -f assets/js/products.js
          test -f assets/js/app.js
          test -f campanhas/malbec.html
          test -f campanhas/lily.html
          test -f campanhas/floratta.html
          test -f campanhas/nativa-spa.html
          test -f campanhas/body-splash.html
          test -f campanhas/kits-presenteaveis.html
          test -f docs/TEXTOS-MARKETPLACE.md
          test -f docs/POSTS-STORIES-CAMPANHAS.md

      - name: Conferir referências principais
        run: |
          grep -q "assets/css/style.css" index.html
          grep -q "assets/js/products.js" index.html
          grep -q "assets/js/app.js" index.html
          grep -q "Elegance Cosméticos" index.html
          grep -q "const products" assets/js/products.js
          grep -q "const best" assets/js/products.js
          grep -q "const offers" assets/js/products.js
          grep -q "Malbec" campanhas/malbec.html
          grep -q "Lily" campanhas/lily.html
          grep -q "Floratta" campanhas/floratta.html
          grep -q "Nativa SPA" campanhas/nativa-spa.html
          grep -q "Body Splash" campanhas/body-splash.html
          grep -q "Kits" campanhas/kits-presenteaveis.html
          grep -q "wa.me/5531995170249" campanhas/malbec.html
          grep -q "wa.me/5531995170249" campanhas/lily.html
          grep -q "wa.me/5531995170249" campanhas/floratta.html
          grep -q "wa.me/5531995170249" campanhas/nativa-spa.html
          grep -q "wa.me/5531995170249" campanhas/body-splash.html
          grep -q "wa.me/5531995170249" campanhas/kits-presenteaveis.html
          grep -q "Textos prontos" docs/TEXTOS-MARKETPLACE.md
          grep -q "Mensagem padrão de fechamento" docs/TEXTOS-MARKETPLACE.md
          grep -q "Posts e stories" docs/POSTS-STORIES-CAMPANHAS.md
          grep -q "Chamada para ação padrão" docs/POSTS-STORIES-CAMPANHAS.md
